app:
  # DB optional mode.
  # false: UI/CSS 화면만 확인 가능, DB 기능은 503 FEATURE_DISABLED 로 응답
  db:
    enabled: ${APP_DB_ENABLED:false}

spring:
  datasource:
    # APP_DB_ENABLED=true 일 때만 실제 값 필요
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.etl.sfdc.user.model.dto
  configuration:
    mapUnderscoreToCamelCase: true

salesforce:
  # Client Credentials 기반 access token 발급 설정
  tokenUrl: ${SALESFORCE_TOKEN_URL:/services/oauth2/token}
  access-token-ttl-minutes: 55



routing:
  engine:
    base-url: ${ROUTING_ENGINE_BASE_URL:http://localhost:${ROUTING_APP_PORT:3931}}
