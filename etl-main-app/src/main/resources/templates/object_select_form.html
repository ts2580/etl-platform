<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>오브젝트 선택</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-violet-100 text-slate-800">
<div class="mx-auto flex min-h-screen w-full max-w-6xl items-center px-4 py-8 sm:px-6 lg:px-8">
    <main class="w-full rounded-2xl border border-indigo-100 bg-white/95 p-5 shadow-xl shadow-indigo-100 sm:p-8">
        <h2 class="text-2xl font-bold tracking-tight text-indigo-700 sm:text-3xl">오브젝트 선택</h2>
        <p class="mt-2 text-sm text-slate-500 sm:text-base">동기화할 오브젝트를 선택한 뒤 Submit 해주세요.</p>

        <form th:action="@{/etl/ddl}" method="post" class="mt-5">
            <div class="mb-3 flex justify-end">
                <button class="inline-flex items-center justify-center rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:from-indigo-700 hover:to-violet-700" type="submit">Submit</button>
            </div>

            <div class="overflow-x-auto rounded-xl border border-indigo-100">
                <table class="min-w-full divide-y divide-indigo-100 text-sm">
                    <thead class="bg-indigo-50 text-slate-700">
                    <tr>
                        <th class="px-3 py-3 text-left font-semibold">선택</th>
                        <th class="px-3 py-3 text-left font-semibold">라벨명</th>
                        <th class="px-3 py-3 text-left font-semibold">API명</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-indigo-50 bg-white">
                    <tr th:each="object : ${objectDefinitions}" class="hover:bg-indigo-50/40">
                        <td class="px-3 py-3" data-label="선택">
                            <input type="checkbox" class="h-4 w-4 rounded border-indigo-300 text-indigo-600 focus:ring-indigo-500" th:name="selectedObject" th:value="${object.name}" />
                        </td>
                        <td class="px-3 py-3" data-label="라벨명" th:text="${object.label}"></td>
                        <td class="px-3 py-3" data-label="API명" th:text="${object.name}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="mt-4 flex justify-end">
                <button class="inline-flex items-center justify-center rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:from-indigo-700 hover:to-violet-700" type="submit">Submit</button>
            </div>
        </form>
    </main>
</div>
</body>
</html>
