<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원가입</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-violet-100 text-slate-800">
<div class="mx-auto flex min-h-screen w-full max-w-5xl items-center justify-center px-4 py-8 sm:px-6 lg:px-8">
    <main class="w-full max-w-md rounded-2xl border border-indigo-100 bg-white/95 p-6 shadow-xl shadow-indigo-100 sm:p-8">
        <div th:if="${!dbEnabled}" class="mb-4 rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-900">
            DB 비활성 모드라서 회원가입은 잠시 꺼져 있어요. 지금은 화면/CSS 점검용으로만 열어둔 상태입니다.
        </div>

        <form th:action="@{/user/signup}" th:object="${UserCreateForm}" method="post" id="signup-form" class="space-y-3" th:if="${dbEnabled}">
            <h2 class="text-2xl font-bold tracking-tight text-indigo-700">회원가입</h2>
            <p class="text-sm text-slate-500">간단한 정보 입력 후 ETL 서비스를 이용할 수 있습니다.</p>

            <input class="h-11 w-full rounded-xl border border-indigo-100 bg-indigo-50/60 px-3 text-sm outline-none transition focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-100" type="text" id="username" placeholder="사용자명" th:field="*{username}" />
            <input class="h-11 w-full rounded-xl border border-indigo-100 bg-indigo-50/60 px-3 text-sm outline-none transition focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-100" type="password" id="password1" placeholder="비밀번호" th:field="*{password1}" />
            <input class="h-11 w-full rounded-xl border border-indigo-100 bg-indigo-50/60 px-3 text-sm outline-none transition focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-100" type="password" id="password2" placeholder="비밀번호 확인" th:field="*{password2}" />
            <input class="h-11 w-full rounded-xl border border-indigo-100 bg-indigo-50/60 px-3 text-sm outline-none transition focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-100" type="email" id="email" placeholder="이메일" th:field="*{email}" />
            <input class="h-11 w-full rounded-xl border border-indigo-100 bg-indigo-50/60 px-3 text-sm outline-none transition focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-100" type="text" id="description" placeholder="자기소개" th:field="*{description}" />

            <button class="inline-flex w-full items-center justify-center rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:from-indigo-700 hover:to-violet-700" type="submit">회원가입</button>
        </form>

        <div th:if="${!dbEnabled}" class="space-y-3">
            <h2 class="text-2xl font-bold tracking-tight text-indigo-700">회원가입</h2>
            <p class="text-sm text-slate-500">DB 연결 전에는 입력 폼만 확인할 수 있습니다.</p>
            <input class="h-11 w-full rounded-xl border border-slate-200 bg-slate-100 px-3 text-sm text-slate-400" type="text" placeholder="사용자명 (비활성)" disabled />
            <input class="h-11 w-full rounded-xl border border-slate-200 bg-slate-100 px-3 text-sm text-slate-400" type="password" placeholder="비밀번호 (비활성)" disabled />
            <input class="h-11 w-full rounded-xl border border-slate-200 bg-slate-100 px-3 text-sm text-slate-400" type="password" placeholder="비밀번호 확인 (비활성)" disabled />
            <input class="h-11 w-full rounded-xl border border-slate-200 bg-slate-100 px-3 text-sm text-slate-400" type="email" placeholder="이메일 (비활성)" disabled />
            <input class="h-11 w-full rounded-xl border border-slate-200 bg-slate-100 px-3 text-sm text-slate-400" type="text" placeholder="자기소개 (비활성)" disabled />
            <button class="inline-flex w-full items-center justify-center rounded-xl bg-slate-200 px-4 py-2.5 text-sm font-semibold text-slate-500 cursor-not-allowed" type="button" disabled>회원가입 비활성</button>
        </div>
    </main>
</div>
</body>
</html>
