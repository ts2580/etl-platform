<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ETL 회원가입</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/top-progress.css">
    <script defer src="/js/top-progress.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#eef2ff] via-[#f3ecff] to-[#e9f5ff] text-[#2b2f5a]">
<div id="top-progress-bar" aria-hidden="true"></div>

<div class="mx-auto flex min-h-screen w-full max-w-[780px] items-start justify-center px-5 py-10 sm:px-8">
    <main class="w-full max-w-[460px]">
        <div class="mb-8 text-center">
            <a href="/" class="inline-flex items-center justify-center text-4xl font-extrabold tracking-tight text-[#4f46e5] sm:text-5xl">ETL</a>
            <p class="mt-3 text-sm text-[#6b7280]">ETL 플랫폼 회원가입</p>
        </div>

        <div th:if="${!dbEnabled}" class="mb-5 rounded-md border border-[#c7d2fe] bg-[#eef2ff] px-4 py-3 text-sm text-[#3730a3]">
            DB 비활성 모드라서 회원가입은 잠시 꺼져 있어요. 지금은 화면 확인용으로만 열려 있습니다.
        </div>

        <form th:if="${dbEnabled}" th:action="@{/user/signup}" th:object="${UserCreateForm}" method="post" id="signup-form" class="space-y-5 rounded-2xl border border-[#d9ddfb] bg-white/95 px-5 py-6 shadow-xl shadow-[#c7d2fe]/50 backdrop-blur-sm sm:px-7 sm:py-8">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-[#312e81]">회원가입</h1>
                <p class="mt-2 text-sm text-[#7c83ad]">ETL 가입 폼입니다.</p>
            </div>

            <div th:if="${signupError}" class="rounded-md border border-[#f9a8d4] bg-[#fdf2f8] px-4 py-3 text-sm text-[#be185d]" th:text="${signupError}"></div>
            <div th:if="${#fields.hasAnyErrors()}" class="rounded-md border border-[#f9a8d4] bg-[#fdf2f8] px-4 py-3 text-sm text-[#be185d]">
                <ul class="space-y-1">
                    <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
                </ul>
            </div>

            <section class="space-y-3">
                <div>
                    <label for="id" class="mb-2 block text-sm font-semibold text-[#2e2a5f]">아이디</label>
                    <div class="flex items-center rounded-md border border-[#d4d9ff] bg-[#f8faff] px-4 focus-within:border-[#6366f1] focus-within:ring-1 focus-within:ring-[#6366f1]">
                        <input type="text" id="id" name="id" th:field="*{id}" maxlength="41" autocapitalize="none" placeholder="아이디" class="h-14 w-full border-0 bg-transparent text-base text-[#1f2546] outline-none placeholder:text-[#a1a7c8]">
                    </div>
                </div>

                <div>
                    <label for="password1" class="mb-2 block text-sm font-semibold text-[#2e2a5f]">비밀번호</label>
                    <div class="rounded-md border border-[#d4d9ff] bg-[#f8faff] px-4 focus-within:border-[#6366f1] focus-within:ring-1 focus-within:ring-[#6366f1]">
                        <input type="password" id="password1" th:field="*{password1}" autocomplete="new-password" placeholder="비밀번호" class="h-14 w-full border-0 bg-transparent text-base text-[#1f2546] outline-none placeholder:text-[#a1a7c8]">
                    </div>
                </div>

                <div>
                    <label for="password2" class="mb-2 block text-sm font-semibold text-[#2e2a5f]">비밀번호 확인</label>
                    <div class="rounded-md border border-[#d4d9ff] bg-[#f8faff] px-4 focus-within:border-[#6366f1] focus-within:ring-1 focus-within:ring-[#6366f1]">
                        <input type="password" id="password2" th:field="*{password2}" autocomplete="new-password" placeholder="비밀번호 확인" class="h-14 w-full border-0 bg-transparent text-base text-[#1f2546] outline-none placeholder:text-[#a1a7c8]">
                    </div>
                </div>

                <div>
                    <label for="email" class="mb-2 block text-sm font-semibold text-[#2e2a5f]">이메일</label>
                    <div class="rounded-md border border-[#d4d9ff] bg-[#f8faff] px-4 focus-within:border-[#6366f1] focus-within:ring-1 focus-within:ring-[#6366f1]">
                        <input type="email" id="email" th:field="*{email}" placeholder="이메일 주소" class="h-14 w-full border-0 bg-transparent text-base text-[#1f2546] outline-none placeholder:text-[#a1a7c8]">
                    </div>
                </div>
            </section>

            <section class="space-y-3">
                <h2 class="text-sm font-semibold text-[#2e2a5f]">기본 정보</h2>

                <div>
                    <label for="name" class="mb-2 block text-sm font-semibold text-[#2e2a5f]">이름</label>
                    <div class="rounded-md border border-[#d4d9ff] bg-[#f8faff] px-4 focus-within:border-[#6366f1] focus-within:ring-1 focus-within:ring-[#6366f1]">
                        <input type="text" id="name" th:field="*{name}" placeholder="이름" class="h-14 w-full border-0 bg-transparent text-base text-[#1f2546] outline-none placeholder:text-[#a1a7c8]">
                    </div>
                </div>

                <div>
                    <label for="description" class="mb-2 block text-sm font-semibold text-[#2e2a5f]">자기소개</label>
                    <div class="rounded-md border border-[#d4d9ff] bg-[#f8faff] px-4 py-3 focus-within:border-[#6366f1] focus-within:ring-1 focus-within:ring-[#6366f1]">
                        <textarea id="description" th:field="*{description}" rows="4" placeholder="간단한 소개를 입력해 주세요" class="w-full resize-none border-0 bg-transparent text-base text-[#1f2546] outline-none placeholder:text-[#a1a7c8]"></textarea>
                    </div>
                </div>
            </section>

            <button type="submit" class="inline-flex h-14 w-full items-center justify-center rounded-md bg-gradient-to-r from-[#4f46e5] to-[#7c3aed] px-4 text-lg font-semibold text-white transition hover:from-[#4338ca] hover:to-[#6d28d9]">가입하기</button>

            <p class="text-center text-sm text-[#6b7280]">
                이미 계정이 있으신가요?
                <a href="/user/login" class="font-semibold text-[#4f46e5] hover:text-[#4338ca] hover:underline">로그인</a>
            </p>
        </form>

        <div th:if="${!dbEnabled}" class="space-y-4 rounded-2xl border border-[#d9ddfb] bg-white/95 px-5 py-6 shadow-xl shadow-[#c7d2fe]/50 sm:px-7 sm:py-8">
            <h1 class="text-2xl font-bold tracking-tight text-[#312e81]">회원가입</h1>
            <p class="text-sm text-[#7c83ad]">DB 연결 전에는 디자인만 확인할 수 있습니다.</p>
            <input type="text" id="id" name="id" placeholder="아이디 (비활성)" class="h-14 w-full rounded-md border border-[#e0e6ff] bg-[#f4f6ff] px-4 text-base text-[#9ca3af]" disabled>
            <input type="password" placeholder="비밀번호 (비활성)" class="h-14 w-full rounded-md border border-[#e0e6ff] bg-[#f4f6ff] px-4 text-base text-[#9ca3af]" disabled>
            <input type="password" placeholder="비밀번호 확인 (비활성)" class="h-14 w-full rounded-md border border-[#e0e6ff] bg-[#f4f6ff] px-4 text-base text-[#9ca3af]" disabled>
            <input type="email" placeholder="이메일 (비활성)" class="h-14 w-full rounded-md border border-[#e0e6ff] bg-[#f4f6ff] px-4 text-base text-[#9ca3af]" disabled>
            <input type="text" placeholder="이름 (비활성)" class="h-14 w-full rounded-md border border-[#e0e6ff] bg-[#f4f6ff] px-4 text-base text-[#9ca3af]" disabled>
            <textarea rows="4" placeholder="자기소개 (비활성)" class="w-full rounded-md border border-[#e0e6ff] bg-[#f4f6ff] px-4 py-3 text-base text-[#9ca3af]" disabled></textarea>
            <button type="button" disabled class="inline-flex h-14 w-full items-center justify-center rounded-md bg-[#d4d9ff] px-4 text-lg font-semibold text-[#8d95bf]">회원가입 비활성</button>
        </div>
    </main>
</div>
</body>
</html>
