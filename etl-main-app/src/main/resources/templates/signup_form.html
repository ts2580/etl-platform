<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원가입</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" th:href="@{/css/modern-ui.css}" href="/css/modern-ui.css">
</head>
<body>
<div class="page">
    <main class="card narrow">
        <form th:action="@{/user/signup}" th:object="${UserCreateForm}" method="post" id="signup-form" class="stack">
            <h2 class="title">회원가입</h2>
            <p class="subtitle">간단한 정보 입력 후 ETL 서비스를 이용할 수 있습니다.</p>

            <input class="input" type="text" id="username" placeholder="사용자명" th:field="*{username}" />
            <input class="input" type="password" id="password1" placeholder="비밀번호" th:field="*{password1}" />
            <input class="input" type="password" id="password2" placeholder="비밀번호 확인" th:field="*{password2}" />
            <input class="input" type="email" id="email" placeholder="이메일" th:field="*{email}" />
            <input class="input" type="text" id="description" placeholder="자기소개" th:field="*{description}" />

            <button class="btn btn-primary" type="submit">회원가입</button>
        </form>
    </main>
</div>
</body>
</html>
