<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<body>
<th:block th:fragment="panel">
    <section data-tab-panel="summary" class="tab-panel space-y-5">
        <div th:if="${activeOrg != null}" class="rounded-[28px] border border-emerald-200 bg-emerald-50/95 p-5 shadow-sm">
            <p class="text-[11px] font-semibold uppercase tracking-[0.24em] text-emerald-600">현재 선택된 Salesforce Org</p>
            <div class="mt-3 flex flex-wrap items-center gap-2">
                <span class="inline-flex items-center rounded-full bg-emerald-100 px-3 py-1 text-sm font-semibold text-emerald-700" th:text="${activeOrg.orgName}">Org Name</span>
                <span class="inline-flex items-center rounded-full bg-white px-3 py-1 text-xs font-medium text-slate-600 shadow-sm" th:text="${activeOrg.orgKey}">orgKey</span>
            </div>
        </div>

        <div th:if="${activeOrg == null}" class="rounded-[28px] border border-amber-200 bg-amber-50/95 p-5 shadow-sm">
            <p class="text-[11px] font-semibold uppercase tracking-[0.24em] text-amber-600">현재 선택된 Salesforce Org 없음</p>
            <p class="mt-3 text-sm leading-6 text-amber-900">아직 선택된 Org가 없어요. Orgs 탭에서 사용할 Org를 먼저 선택해 주세요.</p>
        </div>

        <th:block th:replace="~{fragments/active_org_routing_table :: table}"></th:block>
    </section>
</th:block>
</body>
</html>
