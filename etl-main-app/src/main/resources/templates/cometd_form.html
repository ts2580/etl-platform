<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connection 생성</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/top-progress.css">
    <script defer src="/js/top-progress.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#eef2ff] via-[#f3ecff] to-[#e9f5ff] text-slate-800">
<div id="top-progress-bar" aria-hidden="true"></div>

<div class="mx-auto flex min-h-screen w-full max-w-[1600px] items-center justify-center px-4 py-8 sm:px-6 lg:px-8">
    <main class="w-full max-w-md rounded-2xl border border-[#d9ddfb] bg-[#f8faff]/95 p-6 shadow-xl shadow-[#c7d2fe]/50 sm:p-8">
        <form th:action="@{/cometd/hand-shake}" method="post" id="login-form" class="space-y-3">
            <div th:if="!${topicNm}">
                <h2 class="text-2xl font-bold tracking-tight text-[#312e81]">HandShake 생성</h2>
                <p class="mt-2 text-sm text-slate-500">구독할 Topic 명을 입력해 연결을 생성하세요.</p>
                <input class="mt-3 h-11 w-full rounded-xl border border-[#d9ddfb] bg-indigo-50/60 px-3 text-sm outline-none transition focus:border-indigo-500 focus:bg-[#f8faff] focus:ring-4 focus:ring-indigo-100" placeholder="Topic 명" type="text" name="TopicNm"/>
                <button class="mt-2 inline-flex w-full items-center justify-center rounded-xl bg-gradient-to-r from-[#4f46e5] to-[#7c3aed] px-4 py-2.5 text-sm font-semibold text-white transition hover:from-[#4338ca] hover:to-[#6d28d9]" type="submit" id="submit">생성</button>
            </div>

            <div th:if="${topicNm}">
                <h2 class="text-2xl font-bold tracking-tight text-[#312e81]">HandShake 완료</h2>
                <p class="mt-2 text-sm text-slate-600">현재 Topic: <strong>[[${topicNm}]]</strong></p>
            </div>
        </form>
    </main>
</div>
</body>
</html>
