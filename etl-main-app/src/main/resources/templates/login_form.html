<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ETL 로그인</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-violet-100 text-slate-800">
<div class="mx-auto flex min-h-screen w-full max-w-5xl items-center justify-center px-4 py-8 sm:px-6 lg:px-8">
    <main class="w-full max-w-md rounded-2xl border border-indigo-100 bg-white/95 p-6 shadow-xl shadow-indigo-100 sm:p-8">
        <h2 class="text-2xl font-bold tracking-tight text-indigo-700">로그인</h2>
        <p class="mt-2 text-sm text-slate-500">계정으로 로그인하고 ETL 작업을 시작하세요.</p>

        <div th:if="${!dbEnabled}" class="mt-4 rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-900">
            DB 비활성 모드라서 로그인은 잠시 꺼져 있어요. 지금은 CSS/레이아웃 확인용으로만 사용해 주세요.
        </div>

        <div th:if="${param.error}" class="mt-4 rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">
            <div th:if="${param.error.contains('login')}">사용자ID 또는 비밀번호를 확인해 주세요.</div>
            <div th:if="${param.error.contains('session')}">중복 로그인이 감지되어 세션이 만료되었습니다.</div>
        </div>

        <form method="post" id="login-form" th:action="@{/user/login}" class="mt-5 space-y-3" th:if="${dbEnabled}">
            <input class="h-11 w-full rounded-xl border border-indigo-100 bg-indigo-50/60 px-3 text-sm outline-none transition focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-100" type="text" name="username" id="username" placeholder="아이디" autocomplete="username">
            <input class="h-11 w-full rounded-xl border border-indigo-100 bg-indigo-50/60 px-3 text-sm outline-none transition focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-100" type="password" name="password" id="password" placeholder="비밀번호" autocomplete="current-password">
            <button class="inline-flex w-full items-center justify-center rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:from-indigo-700 hover:to-violet-700" type="submit">로그인</button>
        </form>

        <div th:if="${!dbEnabled}" class="mt-5 space-y-3">
            <input class="h-11 w-full rounded-xl border border-slate-200 bg-slate-100 px-3 text-sm text-slate-400" type="text" placeholder="아이디 (비활성)" disabled>
            <input class="h-11 w-full rounded-xl border border-slate-200 bg-slate-100 px-3 text-sm text-slate-400" type="password" placeholder="비밀번호 (비활성)" disabled>
            <button class="inline-flex w-full items-center justify-center rounded-xl bg-slate-200 px-4 py-2.5 text-sm font-semibold text-slate-500 cursor-not-allowed" type="button" disabled>로그인 비활성</button>
        </div>

        <p class="mt-4 text-sm">계정이 없으신가요? <a class="font-semibold text-indigo-600 hover:text-indigo-700 hover:underline" th:if="${dbEnabled}" href="/user/signup">회원가입</a><span th:if="${!dbEnabled}" class="font-semibold text-slate-400">회원가입 비활성</span></p>
    </main>
</div>
</body>
</html>
