app:
  # DB optional mode.
  # false: health/basic endpoint만 확인 가능, streaming/pubsub/redis 적재 기능은 비활성화
  # true : DB/MyBatis/Redis 기반 적재 기능 활성화
  # external storage 자격증명 복호화는 APP_DB_CREDENTIAL_KEY를 우선 사용하고,
  # 없을 때만 레거시 app.routing.external-storage.user-key 로 fallback 해요.
  db:
    enabled: ${APP_DB_ENABLED:false}
  salesforce:
    bulk-initial-load:
      chunk-size: ${SALESFORCE_BULK_INITIAL_LOAD_CHUNK_SIZE:2000}
      poll-interval-millis: ${SALESFORCE_BULK_INITIAL_LOAD_POLL_INTERVAL_MILLIS:2000}
      timeout-millis: ${SALESFORCE_BULK_INITIAL_LOAD_TIMEOUT_MILLIS:300000}

server:
  port: ${ROUTING_APP_PORT:3931}

camel:
    component:
        salesforce:
            # routing-engine direct REST / camel Salesforce 기본값
            # 실제 org별 인증값은 요청 payload(mapProperty) / DB 값이 우선한다.
            client-id: ${SALESFORCE_CLIENT_ID:dummy-client-id}
            client-secret: ${SALESFORCE_CLIENT_SECRET:dummy-client-secret}
            login-url: ${SALESFORCE_LOGIN_URL:https://login.salesforce.com}
            api-version: ${SALESFORCE_API_VERSION:60.0}
            instance-url: ${SALESFORCE_INSTANCE_URL:https://example.my.salesforce.com}

salesforce:
    tokenUrl: ${SALESFORCE_TOKEN_URL:/services/oauth2/token}

spring:
    datasource:
        # APP_DB_ENABLED=true 일 때만 실제 값 필요
        driver-class-name: org.mariadb.jdbc.Driver
        url: ${DB_URL:jdbc:mariadb://localhost:3306/test}
        username: ${DB_USERNAME:test}
        password: ${DB_PASSWORD:test}
    data:
        redis:
            host: ${REDIS_URL:localhost}
            port: ${REDIS_PORT:6379}
            password: ${REDIS_PASSWORD:}

logging:
    level:
        com.apache.sfdc.storage.service.ExternalStorageRoutingJdbcExecutor: DEBUG

mybatis:
    mapper-locations: classpath:mapper/**/*.xml
    configuration:
        mapUnderscoreToCamelCase: true
