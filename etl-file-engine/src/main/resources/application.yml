app:
  db:
    enabled: ${APP_DB_ENABLED:false}
  main:
    base-url: ${MAIN_APP_BASE_URL:http://localhost:8080}

spring:
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver

salesforce:
  # 파일 엔진은 메인 모듈이 저장한 org/myDomain/accessToken 정보를 조회해 사용합니다.
  allowed-origins: ${SALESFORCE_ALLOWED_ORIGINS:}
  tokenUrl: ${SALESFORCE_TOKEN_URL:/services/oauth2/token}

server:
  port: ${FILE_APP_PORT:9443}
